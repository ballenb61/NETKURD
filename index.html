<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetKurd AI OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code&display=swap" rel="stylesheet">
    <style>
        body { background-color: #050505; font-family: 'Inter', sans-serif; overflow: hidden; color: #22d3ee; }
        .terminal-text { font-family: 'Fira Code', monospace; }
        .neon-border { box-shadow: 0 0 15px rgba(6, 182, 212, 0.4); border: 1px solid rgba(6, 182, 212, 0.5); }
        .scanline { width: 100%; height: 2px; background: rgba(34, 211, 238, 0.1); position: absolute; top: 0; animation: scan 4s linear infinite; z-index: 20; pointer-events: none; }
        @keyframes scan { from { top: 0; } to { top: 100%; } }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #050505; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #0891b2; border-radius: 10px; }
    </style>
</head>

    </div>
