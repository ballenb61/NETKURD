<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetKurd OS 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code&display=swap" rel="stylesheet">
    <style>
        body { background-color: #050505; font-family: 'Inter', sans-serif; overflow: hidden; }
        .terminal-text { font-family: 'Fira Code', monospace; }
        .neon-border { box-shadow: 0 0 15px rgba(6, 182, 212, 0.4); border: 1px solid rgba(6, 182, 212, 0.5); }
        .scanline {
            width: 100%; height: 2px; background: rgba(34, 211, 238, 0.1);
            position: absolute; top: 0; animation: scan 4s linear infinite;
        }
        @keyframes scan { from { top: 0; } to { top: 100%; } }
    </style>
</head>
<body class="flex items-center justify-center h-screen p-4">
    <div class="scanline"></div>
    
    <div class="w-full max-w-md bg-[#0a0a0a] rounded-xl overflow-hidden neon-border flex flex-col h-[90vh] relative z-10">
        <header class="p-4 border-b border-cyan-900/50 bg-[#0d0d0d] flex items-center gap-3">
            <div class="w-10 h-10 rounded-full border-2 border-cyan-400 flex items-center justify-center shadow-[0_0_10px_#06b6d4]">🧠</div>
            <div>
                <h1 class="text-cyan-400 font-bold text-sm tracking-widest uppercase terminal-text">NetKurd OS v2.6</h1>
                <div class="flex items-center gap-2">
                    <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                    <p class="text-[10px] text-cyan-500/70 terminal-text">SYSTEM ONLINE</p>
                </div>
            </div>
        </header>

        <div id="chat-box" class="flex-1 overflow-y-auto p-4 space-y-4 custom-scrollbar">
            <div class="p-3 rounded border border-cyan-400/20 bg-cyan-950/10 text-cyan-50 text-sm terminal-text">
                [| SYSTEM INITIALIZED |] <br>
                بەخێربێیت فەرماندە. سیستەم ئامادەیە بۆ وەرگرتنی فەرمانەکانت.
            </div>
        </div>

        <div class="p-4 bg-[#0d0d0d] border-t border-cyan-900/50 flex gap-2">
            <input type="text" id="user-input" placeholder="فەرمان بنووسە..." 
                class="flex-1 bg-black border border-cyan-900/50 rounded px-4 py-2 text-sm text-cyan-400 outline-none focus:border-cyan-400 transition-all terminal-text">
            <button onclick="sendMessage()" class="bg-cyan-600 hover:bg-cyan-500 px-4 py-2 rounded font-bold text-xs shadow-[0_0_10px_#06b6d4] transition-all active:scale-95">ناردن</button>
        </div>
    </div>

    <script>
        function sendMessage() {
            const input = document.getElementById('user-input');
            const chatBox = document.getElementById('chat-box');
            if (!input.value.trim()) return;

            // User Message
            const userDiv = document.createElement('div');
            userDiv.className = "ml-auto max-w-[90%] p-3 rounded border border-gray-700 bg-gray-800/30 text-sm text-gray-300 terminal-text my-2";
            userDiv.innerText = input.value;
            chatBox.appendChild(userDiv);

            // Mock AI Response (Since this is a simple HTML version)
            setTimeout(() => {
                const aiDiv = document.createElement('div');
                aiDiv.className = "mr-auto max-w-[90%] p-3 rounded border border-cyan-400/30 bg-cyan-900/10 text-sm text-cyan-100 terminal-text my-2";
                aiDiv.innerHTML = "[| سڵاو فەرماندە |] <br> وەک یەکەم هەنگاو، پڕۆژەکەت بە سەرکەوتوویی کەوتە کار. ئێستا دەتوانیت دیزاینەکە ببینی.";
                chatBox.appendChild(aiDiv);
                chatBox.scrollTop = chatBox.scrollHeight;
            }, 500);

            input.value = "";
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
