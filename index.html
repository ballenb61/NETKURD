<script>
    const API_KEY = "AIzaSyCmgO4FdCNTmV2rn4qS_TobaFKw9ik7ZRY"; 

    async function startChat() {
        const input = document.getElementById('user-input');
        const chatBox = document.getElementById('chat-box');
        if (!input.value.trim()) return;

        const userMsg = input.value;
        
        // پەیامی بەکارهێنەر
        const userDiv = document.createElement('div');
        userDiv.className = "ml-auto max-w-[90%] p-3 rounded border border-gray-700 bg-gray-800/40 text-sm text-gray-300 terminal-text my-2 text-right";
        userDiv.innerText = userMsg;
        chatBox.appendChild(userDiv);
        input.value = "";
        chatBox.scrollTop = chatBox.scrollHeight;

        // پەیامی بارکردن
        const aiDiv = document.createElement('div');
        aiDiv.className = "mr-auto max-w-[90%] p-3 rounded border border-cyan-400/30 bg-cyan-900/10 text-sm text-cyan-100 terminal-text my-2 text-right";
        aiDiv.innerHTML = "...خەریکی پڕۆسێس کردنم";
        chatBox.appendChild(aiDiv);

        try {
            // بەکارهێنانی فۆرماتێکی سادەتر بۆ دڵنیایی
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;
            
            const response = await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: userMsg + " (بە کوردی و زۆر کورت وەک فەرماندەیەک وەڵام بدەرەوە)" }] }]
                })
            });

            const data = await response.json();
            
            if (data.candidates && data.candidates[0].content.parts[0].text) {
                const aiResponse = data.candidates[0].content.parts[0].text;
                aiDiv.innerHTML = `[| NETKURD AI |] <br> ${aiResponse}`;
            } else {
                throw new Error("وەڵام وەرنەگیرا");
            }

        } catch (error) {
            aiDiv.innerHTML = "[| ئیرۆر |] <br> فەرماندە، کێشەیەک لە پەیوەندی (Network) هەیە. دڵنیا بەرەوە ئینتەرنێتەکەت کار دەکات یان کلیلەکە چالاکە.";
            console.error(error);
        }
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    document.getElementById('send-btn').addEventListener('click', startChat);
    document.getElementById('user-input').addEventListener('keypress', (e) => { if (e.key === 'Enter') startChat(); });
</script>
